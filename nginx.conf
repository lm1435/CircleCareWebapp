# nginx config for the CircleCare web companion (static SPA).
# Serves the Vite build, falls back to index.html for client routing, and sets
# the strict security headers the plan requires (Security + Deployment sections).

server {
  listen       8080;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # --- Security headers (applied to every response) -------------------------
  # CSP: script-src is strict ('self', no inline/eval) — the XSS-critical axis.
  # connect-src is limited to the API, Supabase auth (OAuth broker) + storage
  # (signed document/photo URLs), and PostHog. frame-src allows sandboxed PDF
  # preview from Supabase storage. style-src allows inline styles only (Tailwind
  # / PostHog replay inject <style>; not a script-execution vector).
  # NOTE: replace the api.circlecare.app / *.supabase.co / posthog origins below
  # with your real production origins before deploying.
  # RevenueCat Web Billing: the SDK fetches offerings from api.revenuecat.com
  # (connect-src), and the hosted checkout loads Stripe Elements — js.stripe.com
  # (script-src + frame-src), api.stripe.com (connect-src), hooks.stripe.com
  # (frame-src). Without these the offerings call / Subscribe checkout are
  # CSP-blocked. Verify the exact set against RevenueCat's Web Billing CSP docs.
  set $csp "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self'; connect-src 'self' https://api.circlecare.app https://*.supabase.co https://us.i.posthog.com https://us-assets.i.posthog.com https://api.revenuecat.com https://api.rc-backup.com https://api.stripe.com; frame-src 'self' blob: https://*.supabase.co https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests";
  add_header Content-Security-Policy $csp always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-Frame-Options "DENY" always;

  # --- Universal link association files -------------------------------------
  # Must be served as application/json with no auth and no redirect.
  location /.well-known/apple-app-site-association {
    default_type application/json;
    add_header Content-Type application/json;
  }
  location /.well-known/assetlinks.json {
    default_type application/json;
  }

  # --- Static assets: long cache (Vite emits content-hashed filenames) -------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # --- SPA fallback ----------------------------------------------------------
  # index.html itself must never be cached so new deploys are picked up.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
